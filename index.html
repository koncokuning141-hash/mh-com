<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>eMHa cOm</title>
    <style>
        :root { --accent: #00a884; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #050505; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Animasi */
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 25px var(--accent); } 100% { box-shadow: 0 0 5px var(--accent); } }
        
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 80%; max-width: 400px; }
        
        .logo-container { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--accent); display: flex; justify-content: center; align-items: center; overflow: hidden; animation: glow 3s infinite; margin: 0 auto 20px auto; background: #111; }
        #logo-preview { width: 100%; height: 100%; object-fit: cover; }

        .upload-btn { background: var(--accent); padding: 10px 20px; border-radius: 10px; cursor: pointer; display: inline-block; margin-top: 10px; transition: 0.5s; opacity: 1; }
        .hidden { opacity: 0; pointer-events: none; }
        
        .cta-button { margin-top: 25px; padding: 15px 40px; background: transparent; border: 2px solid var(--accent); color: white; border-radius: 50px; cursor: pointer; transition: 0.4s; font-weight: bold; }
        .cta-button:hover { background: var(--accent); box-shadow: 0 0 20px var(--accent); transform: scale(1.05); }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img id="logo-preview" src="https://via.placeholder.com/150?text=LOGO" alt="Logo">
    </div>
    <h2>الســـلام عليكــــم</h2>
    <h2>Selamat Datang di<br>eMHa Komputer</h2>
    <h4>cerdas teknologi kreatifitas tanpa batas</h4>
    <!-- Tombol Upload -->
    <label class="upload-btn" id="upload-label">
        Pilih Logo
        <input type="file" id="logo-input" accept="image/*" style="display:none" onchange="uploadLogo(event)">
    </label>
    
    <br>
    <button class="cta-button" onclick="window.location.href='landing.html'">Masuk ke Sistem</button>
</div>

<script>
    // Fitur Hotkey 'L' untuk menyembunyikan/menampilkan tombol
    let isVisible = false;
    document.addEventListener('keydown', function(event) {
        if (event.key.toLowerCase() === 'l') {
            const btn = document.getElementById('upload-label');
            isVisible = !isVisible;
            btn.style.opacity = isVisible ? "1" : "0";
            btn.style.pointerEvents = isVisible ? "auto" : "none";
        }
    });

    // Fitur Upload Logo
    function uploadLogo(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('logo-preview');
            output.src = reader.result;
            localStorage.setItem('toko_logo', reader.result);
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    // Load data saat pertama kali dibuka
    window.onload = () => {
        // Sembunyikan tombol saat loading awal
        document.getElementById('upload-label').style.opacity = "0";
        document.getElementById('upload-label').style.pointerEvents = "none";
        
        const savedLogo = localStorage.getItem('toko_logo');
        if(savedLogo) document.getElementById('logo-preview').src = savedLogo;
    };
</script>
</body>
</html>
